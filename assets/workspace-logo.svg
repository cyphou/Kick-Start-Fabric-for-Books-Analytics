<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B3A5C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2A5580;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8A838;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4922E;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" />
  <!-- Open book - left page -->
  <path d="M256 160 L256 380 Q200 360 130 370 L130 150 Q200 140 256 160Z" fill="#FFFFFF" opacity="0.95"/>
  <!-- Open book - right page -->
  <path d="M256 160 L256 380 Q312 360 382 370 L382 150 Q312 140 256 160Z" fill="#F0EDE8" opacity="0.95"/>
  <!-- Book spine shadow -->
  <line x1="256" y1="155" x2="256" y2="385" stroke="#1B3A5C" stroke-width="3" opacity="0.3"/>
  <!-- Left page lines -->
  <line x1="155" y1="195" x2="240" y2="190" stroke="#1B3A5C" stroke-width="2" opacity="0.15"/>
  <line x1="150" y1="220" x2="240" y2="215" stroke="#1B3A5C" stroke-width="2" opacity="0.15"/>
  <line x1="148" y1="245" x2="240" y2="240" stroke="#1B3A5C" stroke-width="2" opacity="0.15"/>
  <line x1="146" y1="270" x2="240" y2="265" stroke="#1B3A5C" stroke-width="2" opacity="0.15"/>
  <line x1="145" y1="295" x2="240" y2="290" stroke="#1B3A5C" stroke-width="2" opacity="0.15"/>
  <line x1="143" y1="320" x2="240" y2="315" stroke="#1B3A5C" stroke-width="2" opacity="0.15"/>
  <!-- Right page - chart bars (analytics) -->
  <rect x="280" y="290" width="18" height="55" rx="2" fill="url(#bookGrad)" opacity="0.85"/>
  <rect x="305" y="260" width="18" height="85" rx="2" fill="url(#bookGrad)" opacity="0.85"/>
  <rect x="330" y="230" width="18" height="115" rx="2" fill="url(#bookGrad)" opacity="0.85"/>
  <rect x="355" y="250" width="18" height="95" rx="2" fill="url(#bookGrad)" opacity="0.85"/>
  <!-- Trend line on chart -->
  <polyline points="289,285 314,255 339,225 364,245" fill="none" stroke="#E8A838" stroke-width="2.5" opacity="0.9"/>
  <!-- Star/sparkle accent -->
  <circle cx="340" cy="210" r="4" fill="#E8A838"/>
  <line x1="340" y1="202" x2="340" y2="218" stroke="#E8A838" stroke-width="1.5"/>
  <line x1="332" y1="210" x2="348" y2="210" stroke="#E8A838" stroke-width="1.5"/>
  <!-- Text: HB -->
  <text x="256" y="440" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="48" fill="#E8A838" letter-spacing="8">HORIZON</text>
</svg>

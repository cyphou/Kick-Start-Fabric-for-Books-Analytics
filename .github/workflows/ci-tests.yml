name: Horizon Books - CI Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

jobs:
  pester-tests:
    name: Pester Unit & Non-Regression Tests
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pester 5
        shell: pwsh
        run: |
          Install-Module Pester -Force -SkipPublisherCheck -Scope CurrentUser -MinimumVersion 5.0
          Import-Module Pester -MinimumVersion 5.0

      - name: Run Pester tests
        shell: pwsh
        run: |
          Import-Module Pester -MinimumVersion 5.0 -Force

          $container = New-PesterContainer -Path "./tests/Deploy-HorizonBooks.Tests.ps1"

          $config = New-PesterConfiguration
          $config.Run.Container        = $container
          $config.Run.PassThru         = $true
          $config.Run.Exit             = $false
          $config.Filter.ExcludeTag    = @("Integration")
          $config.Output.Verbosity     = "Detailed"
          $config.TestResult.Enabled   = $true
          $config.TestResult.OutputFormat = "NUnitXml"
          $config.TestResult.OutputPath = "./test-results/pester-results.xml"

          $result = Invoke-Pester -Configuration $config

          Write-Host ""
          Write-Host "=============================="
          Write-Host "  Passed : $($result.PassedCount)"
          Write-Host "  Failed : $($result.FailedCount)"
          Write-Host "  Skipped: $($result.SkippedCount)"
          Write-Host "  Total  : $($result.TotalCount)"
          Write-Host "  Time   : $([math]::Round($result.Duration.TotalSeconds, 2))s"
          Write-Host "=============================="

          if ($result.FailedCount -gt 0) {
            Write-Error "Pester: $($result.FailedCount) test(s) failed."
            exit 1
          }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-test-results
          path: ./test-results/pester-results.xml
          retention-days: 30

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Pester Test Results
          path: ./test-results/pester-results.xml
          reporter: java-junit
          fail-on-error: true
